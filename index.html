<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium Article Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,900;1,9..144,300;1,9..144,900&family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --black: #1a1a1a;
      --gray: #888;
      --border: #e8e8e8;
    }

    html, body {
      min-height: 100%;
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 90px;
      padding-bottom: 100px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .logo-wrap {
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
    }
    .logo-wrap svg { width: 394px; height: 120px; }

    .card {
      width: 394px;
      max-width: 100%;
      background: #fff;
      border: 1px solid #E6E6E6;
      border-radius: 10px;
      padding: 0 0 24px 0;
      box-shadow: 0 1px 2px rgba(26, 26, 26, 0.05);
    }

    .card-inner { padding: 20px 24px 0 24px; }

    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 346px;
      max-width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      color: var(--black);
      background: #fff;
      box-shadow: 0 1px 2px rgba(26, 26, 26, 0.05);
      display: block;
      box-sizing: border-box;
    }
    input[type="text"]:focus { border-color: #1a1a1a; }
    input[type="text"]:disabled { background: #f9f9f9; color: #aaa; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      margin-bottom: 12px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 11px; font-weight: 500; font-family: 'Inter', sans-serif; color: #9E9E9E; }

    .dropzone {
      width: 346px;
      max-width: 100%;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      transition: background 0.2s;
      position: relative;
      background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' rx='8' ry='8' fill='none' stroke='%23D0D0D0' stroke-width='1.5' stroke-dasharray='5%2C5'/%3E%3C/svg%3E");
    }
    .dropzone-inner { padding: 24px 0 28px; display: flex; flex-direction: column; align-items: center; }
    .dropzone:hover, .dropzone.drag-over { background-color: #fafafa; }
    .dropzone-icon { display: flex; justify-content: center; margin-bottom: 4px; }
    .dropzone-text { font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 400; color: #1a1a1a; }

    .file-input-row {
      display: none;
      align-items: center;
      width: 346px;
      height: 36px;
      margin-top: 8px;
      background: #fff;
      border: 1px solid #E6E6E6;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(26,26,26,0.05);
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }
    .file-input-row.show { display: flex; }

    .file-progress-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 12px;
      background: #fff;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .file-progress-layer.fade-out { opacity: 0; }
    .file-progress-track { width: 100%; height: 8px; background: #F0F0F0; border-radius: 100px; overflow: hidden; }
    .file-progress-bar { height: 100%; width: 0%; background: #40CC71; border-radius: 100px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    .file-name-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 8px 0 12px;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    .file-name-layer.visible { opacity: 1; pointer-events: auto; }
    .file-name-text { font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 400; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .file-delete-btn { flex-shrink: 0; margin-left: 8px; background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; }

    .toast-wrap {
      position: fixed; top: 32px; right: 32px; z-index: 999;
      opacity: 0; pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast-wrap.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast { display: flex; align-items: center; height: 36px; border-radius: 8px; white-space: nowrap; }
    .toast-icon { display: flex; align-items: center; padding: 0 0 0 10px; }
    .toast-gap { width: 8px; flex-shrink: 0; }
    .toast-text { font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; color: #fff; padding-right: 10px; line-height: 1; }
    .toast.success { background: #24904A; }
    .toast.error   { background: #D12711; }

    .error-msg { display: none; }

    .btn-score {
      width: 346px; height: 36px; max-width: 100%;
      margin-top: 20px; padding: 0 14px;
      background: #000000; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-score:hover { background: #262626; }
    .btn-score:disabled { background: #000000; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.30);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .panel-overlay.show { opacity: 1; pointer-events: auto; }

    .result-card {
      position: fixed;
      top: 16px; right: 16px; bottom: 16px;
      width: 626px; max-width: calc(100vw - 32px);
      background: #fff; border-radius: 10px;
      box-shadow: 0 1px 2px rgba(26,26,26,0.05);
      z-index: 201;
      display: flex; flex-direction: column;
      transform: translateX(calc(100% + 32px));
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      overflow: visible;
    }
    .result-card.show { transform: translateX(0); }

    .panel-scroll {
      overflow-y: auto;
      overflow-x: visible;
      flex: 1;
      padding: 0 0 24px 0;
    }
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; width: 100%;
      overflow: hidden; line-height: 0; pointer-events: none; z-index: 100;
    }
    .bottom-bar svg { width: 100%; height: auto; display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      .logo-wrap svg { width: 260px; }
    }
  </style>
</head>

  <!-- Input Card -->
  <div class="card" style="position:relative; z-index:1;">
    <div class="card-inner">
      <label class="field-label">Medium Link</label>
      <input type="text" id="urlInput" placeholder="https://medium.com/@kullanici/makale-basligi" />

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">VEYA</span>
        <div class="divider-line"></div>
      </div>

      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".txt,.docx" style="display:none" />
        <div class="dropzone-inner">
          <div class="dropzone-icon" id="dzIcon">
            <svg width="31" height="31" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.5026 30.625L17.5026 13.125M17.5026 13.125L23.3359 18.9583M17.5026 13.125L11.6693 18.9583M23.3359 27.7083L29.1693 27.7083C29.9428 27.7083 30.6847 27.401 31.2317 26.8541C31.7787 26.3071 32.0859 25.5652 32.0859 24.7917L32.0859 10.2083C32.0859 9.43479 31.7787 8.69292 31.2317 8.14594C30.6847 7.59896 29.9428 7.29167 29.1693 7.29167L5.83594 7.29167C5.06239 7.29167 4.32053 7.59896 3.77355 8.14594C3.22656 8.69292 2.91927 9.43478 2.91927 10.2083L2.91927 24.7917C2.91927 25.5652 3.22656 26.3071 3.77354 26.8541C4.32053 27.401 5.06239 27.7083 5.83594 27.7083L11.6693 27.7083" stroke="#09090B" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="dropzone-text" id="dzText">Dokümanını buraya sürükle veya tıkla</div>
        </div>
      </div>

      <div class="file-input-row" id="fileInputRow">
        <div class="file-progress-layer" id="fileProgressLayer">
          <div class="file-progress-track">
            <div class="file-progress-bar" id="fileProgressBar"></div>
          </div>
        </div>
        <div class="file-name-layer" id="fileNameLayer">
          <span class="file-name-text" id="fileNameText"></span>
          <button class="file-delete-btn" id="fileDeleteBtn" onmouseover="this.querySelector('path:first-child').setAttribute('fill','#D9D9D9')" onmouseout="this.querySelector('path:first-child').setAttribute('fill','#E8E8E8')">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 4C0 1.79086 1.79086 0 4 0H16C18.2091 0 20 1.79086 20 4V16C20 18.2091 18.2091 20 16 20H4C1.79086 20 0 18.2091 0 16V4Z" fill="#E8E8E8"/>
              <path d="M13 7L7 13" stroke="#09090B" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M7 7L13 13" stroke="#09090B" stroke-width="1.33" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn-score" id="scoreBtn" onclick="handleScore()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Makaleyi puanla</span>
      </button>
    </div>
  </div>

  <!-- Show again -->
  <div id="showAgainWrap" style="
    display:none; width:394px; max-width:100%;
    margin-top:-8px;
    transition: opacity 0.3s ease, transform 0.3s ease;
    opacity:0; transform: translateY(-6px);
    background:#F6F6F6; border: 1px solid #E6E6E6;
    border-radius:0 0 10px 10px;
    padding: 31px 24px 24px 24px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(26,26,26,0.05);
  ">
    <button onclick="reopenPanel()" style="
      width:344px; height:36px; background:#fff;
      border: 1px solid #E6E6E6; border-radius:8px;
      font-size:14px; font-weight:500; font-family:'Inter',sans-serif;
      color:#1a1a1a; cursor:pointer; display:block;
      box-shadow: 0 1px 2px rgba(26,26,26,0.05);
      transition: background 0.2s;
    " onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">
      Değerlendirmeyi tekrar göster
    </button>
  </div>

  <!-- Overlay -->
  <div class="panel-overlay" id="panelOverlay"></div>

  <!-- Result Panel -->
  <div class="result-card" id="resultCard">
    <div class="panel-scroll">
      <div style="position:relative; margin: 24px 24px 0 24px; overflow:visible;">

        <!-- Gray rectangle -->

            <path d="M11.2031 11.2031L20.8031 20.8031" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Orange score badge -->
        <div style="position:absolute; left:10px; top:10px; width:184px; height:44px; background:#F66814; border-radius:6px; display:flex; align-items:center; padding:0 6px 0 16px; box-sizing:border-box; z-index:202; overflow:visible;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
            <path d="M5.33333 8H10.6667M10.6667 8L8 10.6667M10.6667 8L8 5.33333M3.33333 2H12.6667C13.403 2 14 2.59695 14 3.33333V12.6667C14 13.403 13.403 14 12.6667 14H3.33333C2.59695 14 2 13.403 2 12.6667V3.33333C2 2.59695 2.59695 2 3.33333 2Z" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span style="font-size:12px; font-weight:700; font-family:'Inter',sans-serif; color:#fff; margin-left:16px; margin-right:12px; white-space:nowrap;">SKOR</span>
          <div style="width:85px; height:32px; flex-shrink:0; background:#fff; border-radius:4px; display:flex; align-items:center; justify-content:center;">
            <span id="scoreBadgeNum" style="font-size:18px; font-weight:700; font-family:'Inter',sans-serif; color:#1a1a1a;">—</span>
            <span style="font-size:18px; font-weight:700; font-family:'Inter',sans-serif; color:#B7B7B7;">/100</span>
          </div>
        </div>

        <!-- Summary card -->
        <div id="summaryCard" style="width:578px; margin-top:16px; background:#fff; border:1px solid #E6E6E6; border-radius:10px; box-shadow:0 1px 2px rgba(26,26,26,0.05); overflow:hidden; padding-bottom:12px;">
          <div style="padding:12px 16px 0 16px; font-size:14px; font-weight:600; font-family:'Inter',sans-serif; color:#1a1a1a;">Genel Makale Değerlendirmesi</div>
          <div style="margin-top:10px; height:1px; background:#E6E6E6;"></div>
          <p id="summaryText" style="margin:8px 16px 0 16px; font-size:13px; font-weight:400; font-family:'Inter',sans-serif; color:#444; line-height:21px; letter-spacing:-0.13px;"></p>
        </div>

        <!-- Güçlü Yönler -->
        <div id="secondCard" style="width:578px; margin-top:16px; background:#fff; border:1px solid #C2E0CC; border-radius:10px; box-shadow:0 1px 2px rgba(26,26,26,0.05); overflow:hidden; padding-bottom:12px;">
          <div style="padding:12px 16px 10px 16px; font-size:13px; font-weight:600; font-family:'Inter',sans-serif; color:#24904A; background:#E9F4ED;">Güçlü Yönler</div>
          <div style="height:1px; background:#C2E0CC;"></div>
          <div id="strengthsList"></div>
        </div>

        <!-- Geliştirilebilir Yönler -->
        <div id="improvementsCard" style="width:578px; margin-top:16px; background:#fff; border:1px solid #FFDEC3; border-radius:10px; box-shadow:0 1px 2px rgba(26,26,26,0.05); overflow:hidden; padding-bottom:12px;">
          <div style="padding:12px 16px 10px 16px; font-size:13px; font-weight:600; font-family:'Inter',sans-serif; color:#F37919; background:#FEF2E8;">Geliştirilebilir Yönler</div>
          <div style="height:1px; background:#FFDEC3;"></div>
          <div id="improvementsList"></div>
        </div>

        <!-- Reader Perspective card -->
        <div id="readerPerspectiveCard" style="display:none; width:578px; margin-top:16px; background:#fff; border:1px solid #B3E5FD; border-radius:10px; box-shadow:0 1px 2px rgba(26,26,26,0.05); overflow:hidden; padding-bottom:12px;">
          <div style="padding:12px 16px 10px 16px; font-size:13px; font-weight:600; font-family:'Inter',sans-serif; color:#3090BD; background:#E8F7FE; margin-top:0;">Okuyucu Perspektifi</div>
          <div style="height:1px; background:#B3E5FD;"></div>
          <div id="readerPerspectiveContent" style="font-size:13px; font-weight:400; font-family:'Inter',sans-serif; color:#444; line-height:21px; letter-spacing:-0.13px;"></div>
        </div>

        <!-- Headline & Hook card -->
        <div id="headlineHookCard" style="display:none; width:578px; margin-top:16px; background:#fff; border:1px solid #D3CCFF; border-radius:10px; box-shadow:0 1px 2px rgba(26,26,26,0.05); overflow:hidden; padding-bottom:12px;">
          <div style="padding:12px 16px 10px 16px; font-size:13px; font-weight:600; font-family:'Inter',sans-serif; color:#6857D8; background:#EBE8FE;">Başlık & Hook</div>
          <div style="height:1px; background:#D3CCFF;"></div>
          <div id="headlineHookContent" style="font-size:13px; font-weight:400; font-family:'Inter',sans-serif; color:#444; line-height:21px; letter-spacing:-0.13px;"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bottom MEDIUM bar -->
  <div class="bottom-bar">
    <svg viewBox="0 0 1440 22" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0 0H5.03502L11.778 15.7037H12.0441L18.7871 0H23.8221V21.672H19.8739V6.78307H19.6632L13.3861 21.6085H10.436L4.15888 6.75132H3.94817V21.672H0V0Z" fill="black"/>
      <path d="M291.263 21.672V0H306.035V3.29101H295.377V9.1746H305.27V12.4656H295.377V18.381H306.124V21.672H291.263Z" fill="black"/>
      <path d="M580.89 21.672H573.193V0H581.045C583.3 0 585.237 0.433863 586.856 1.30159C588.483 2.16226 589.732 3.40035 590.605 5.01587C591.477 6.63139 591.914 8.56437 591.914 10.8148C591.914 13.0723 591.474 15.0123 590.594 16.6349C589.721 18.2575 588.461 19.5026 586.812 20.3704C585.171 21.2381 583.197 21.672 580.89 21.672ZM577.308 18.2751H580.69C582.272 18.2751 583.592 18 584.649 17.4497C585.707 16.8924 586.502 16.0635 587.034 14.963C587.566 13.8554 587.832 12.4727 587.832 10.8148C587.832 9.15697 587.566 7.78131 587.034 6.68783C586.502 5.5873 585.714 4.76543 584.672 4.22222C583.637 3.67196 582.35 3.39683 580.812 3.39683H577.308V18.2751Z" fill="black"/>
      <path d="M862.898 0V21.672H858.783V0H862.898Z" fill="black"/>
      <path d="M1144.63 0H1148.75V14.1587C1148.75 15.7108 1148.36 17.0758 1147.59 18.254C1146.83 19.4321 1145.76 20.3527 1144.38 21.0159C1142.99 21.672 1141.38 22 1139.53 22C1137.67 22 1136.05 21.672 1134.67 21.0159C1133.29 20.3527 1132.22 19.4321 1131.46 18.254C1130.69 17.0758 1130.31 15.7108 1130.31 14.1587V0H1134.43V13.8307C1134.43 14.7337 1134.63 15.5379 1135.05 16.2434C1135.47 16.9489 1136.06 17.5026 1136.82 17.9048C1137.59 18.2998 1138.49 18.4974 1139.53 18.4974C1140.57 18.4974 1141.47 18.2998 1142.24 17.9048C1143 17.5026 1143.6 16.9489 1144.01 16.2434C1144.42 15.5379 1144.63 14.7337 1144.63 13.8307V0Z" fill="black"/>
      <path d="M1416.18 0H1421.21L1427.96 15.7037H1428.22L1434.97 0H1440V21.672H1436.05V6.78307H1435.84L1429.56 21.6085H1426.61L1420.34 6.75132H1420.13V21.672H1416.18V0Z" fill="black"/>
    </svg>
  </div>

  <!-- Toast -->
  <div class="toast-wrap" id="toastWrap">
    <div class="toast" id="toastEl">
      <span class="toast-icon" id="toastIcon"></span>
      <span class="toast-gap"></span>
      <span class="toast-text" id="toastText"></span>
    </div>
  </div>

  <script>
    function showAgainBtn() {
      const el = document.getElementById("showAgainWrap");
      el.style.display = "block";
      requestAnimationFrame(() => { el.style.opacity = "1"; el.style.transform = "translateY(0)"; });
    }
    function hideAgainBtn() {
      const el = document.getElementById("showAgainWrap");
      el.style.opacity = "0"; el.style.transform = "translateY(-6px)";
      setTimeout(() => { el.style.display = "none"; }, 300);
    }

    const SUCCESS_SVG = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="1" stroke="white" stroke-width="2"/><path d="M5 8.33594L7 10.3359L11 6.33594" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const ERROR_SVG   = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="1" stroke="white" stroke-width="2"/><path d="M10 6L6 10M6 6L10 10" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    let toastTimer = null;
    function showToast(type, message) {
      const wrap = document.getElementById("toastWrap");
      const el = document.getElementById("toastEl");
      el.className = "toast " + type;
      document.getElementById("toastIcon").innerHTML = type === "success" ? SUCCESS_SVG : ERROR_SVG;
      document.getElementById("toastText").textContent = message;
      wrap.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => wrap.classList.remove("show"), 3000);
    }

    let docText = "", fileName = "";
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const urlInput = document.getElementById("urlInput");

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => { e.preventDefault(); dropzone.classList.remove("drag-over"); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
    fileInput.addEventListener("change", (e) => { const f = e.target.files[0]; if (f) handleFile(f); });

    urlInput.addEventListener("input", () => {
      if (urlInput.value.trim()) { docText = ""; fileName = ""; resetDropzone(); urlInput.disabled = false; }
      else { hideAgainBtn(); }
    });

    const IMPORT_SVG = `<svg width="31" height="31" viewBox="0 0 35 35" fill="none"><path d="M17.5026 30.625L17.5026 13.125M17.5026 13.125L23.3359 18.9583M17.5026 13.125L11.6693 18.9583M23.3359 27.7083L29.1693 27.7083C29.9428 27.7083 30.6847 27.401 31.2317 26.8541C31.7787 26.3071 32.0859 25.5652 32.0859 24.7917L32.0859 10.2083C32.0859 9.43479 31.7787 8.69292 31.2317 8.14594C30.6847 7.59896 29.9428 7.29167 29.1693 7.29167L5.83594 7.29167C5.06239 7.29167 4.32053 7.59896 3.77355 8.14594C3.22656 8.69292 2.91927 9.43478 2.91927 10.2083L2.91927 24.7917C2.91927 25.5652 3.22656 26.3071 3.77354 26.8541C4.32053 27.401 5.06239 27.7083 5.83594 27.7083L11.6693 27.7083" stroke="#09090B" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    let docxBase64 = "";

    function handleFile(file) {
      fileName = file.name;
      urlInput.value = "";
      urlInput.disabled = true;
      docText = ""; docxBase64 = "";
      hideAgainBtn();
      const row = document.getElementById("fileInputRow");
      const bar = document.getElementById("fileProgressBar");
      const progressLayer = document.getElementById("fileProgressLayer");
      const nameLayer = document.getElementById("fileNameLayer");
      const nameText = document.getElementById("fileNameText");
      progressLayer.classList.remove("fade-out"); nameLayer.classList.remove("visible");
      bar.style.width = "0%"; row.classList.add("show");
      setTimeout(() => { bar.style.width = "100%"; }, 50);

      const isDocx = file.name.toLowerCase().endsWith(".docx");
      const reader = new FileReader();
      reader.onload = (e) => {
        if (isDocx) {
          // Store as base64 for backend processing
          const bytes = new Uint8Array(e.target.result);
          let binary = "";
          bytes.forEach(b => binary += String.fromCharCode(b));
          docxBase64 = btoa(binary);
        } else {
          docText = e.target.result;
        }
        setTimeout(() => {
          progressLayer.classList.add("fade-out");
          setTimeout(() => { nameText.textContent = fileName; nameLayer.classList.add("visible"); showToast("success", "Doküman başarıyla yüklendi."); }, 350);
        }, 600);
      };
      if (isDocx) {
        reader.readAsArrayBuffer(file);
      } else {
        reader.readAsText(file);
      }
    }

    function resetDropzone() {
      dropzone.classList.remove("has-file");
      document.getElementById("dzIcon").innerHTML = IMPORT_SVG;
      document.getElementById("dzText").className = "dropzone-text";
      document.getElementById("dzText").textContent = "Dokümanını buraya sürükle veya tıkla";
      const row = document.getElementById("fileInputRow");
      row.classList.remove("show");
      document.getElementById("fileProgressBar").style.width = "0%";
      document.getElementById("fileProgressLayer").classList.remove("fade-out");
      document.getElementById("fileNameLayer").classList.remove("visible");
      docText = ""; docxBase64 = ""; fileName = ""; urlInput.disabled = false;
      hideAgainBtn();
    }

    document.addEventListener("click", (e) => { if (e.target.closest("#fileDeleteBtn")) resetDropzone(); });

    function closePanel() {
      document.getElementById("resultCard").classList.remove("show");
      document.getElementById("panelOverlay").classList.remove("show");
      showAgainBtn();
    }
    function reopenPanel() {
      document.getElementById("resultCard").classList.add("show");
      document.getElementById("panelOverlay").classList.add("show");
    }

    document.getElementById("panelOverlay").addEventListener("click", closePanel);
    document.addEventListener("click", (e) => { if (e.target.closest("#panelCloseBtn")) closePanel(); });

    function setLoading(on) {
      const btn = document.getElementById("scoreBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      btn.disabled = on;
      spinner.style.display = on ? "inline-block" : "none";
      btnText.textContent = on ? "Analiz ediliyor..." : "Makaleyi puanla";
      btnText.style.fontWeight = "500";
      btnText.style.fontFamily = "'Inter', sans-serif";
      btnText.style.fontSize = "14px";
    }

    function renderResult(data) {
      document.getElementById("scoreBadgeNum").textContent = data.score;
      document.getElementById("summaryText").textContent = data.summary;

      const sl = document.getElementById("strengthsList");
      sl.innerHTML = "";
      (data.strengths || []).forEach((s, i) => {
        const num = String(i + 1).padStart(2, "0");
        const isLast = i === (data.strengths.length - 1);
        sl.innerHTML += `<div style="padding:12px 16px ${isLast?"0":"12px"} 16px;"><div style="font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:#1a1a1a;margin-bottom:6px;letter-spacing:-0.13px;">${s.title}</div><div style="font-size:13px;font-weight:400;font-family:'Inter',sans-serif;color:#444;line-height:21px;letter-spacing:-0.13px;">${s.detail}</div></div>${!isLast?'<div style="height:1px;background:#C2E0CC;"></div>':""}`;
      });

      const il = document.getElementById("improvementsList");
      il.innerHTML = "";
      (data.improvements || []).forEach((imp, i) => {
        const num = String(i + 1).padStart(2, "0");
        const isLast = i === (data.improvements.length - 1);
        il.innerHTML += `<div style="padding:12px 16px ${isLast?"0":"12px"} 16px;"><div style="font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:#1a1a1a;margin-bottom:6px;letter-spacing:-0.13px;">${imp.title}</div><div style="font-size:13px;font-weight:400;font-family:'Inter',sans-serif;color:#444;line-height:21px;letter-spacing:-0.13px;">${imp.detail}</div></div>${!isLast?'<div style="height:1px;background:#FFDEC3;"></div>':""}`;
      });

      // Reader Perspective
      if (data.reader_perspective) {
        const rp = data.reader_perspective;
        const sections = [
          { key: "takeaways", label: "Temel Öğrenimler" },
          { key: "confusion_points", label: "Kafa Karışıklığı Noktaları" },
          { key: "drop_off_points", label: "İlgi Düşme Noktaları" },
          { key: "skimmability", label: "Hızlı Okunabilirlik", single: true }
        ];

        const rpEl = document.getElementById("readerPerspectiveContent");
        rpEl.innerHTML = "";

        let visibleSections = sections.filter(s => {
          const val = rp[s.key];
          return val && (Array.isArray(val) ? val.length > 0 : true);
        });

        visibleSections.forEach((section, si) => {
          const val = rp[section.key];
          const items = section.single ? [val] : val;
          const isLast = si === visibleSections.length - 1;

          const wrapper = document.createElement("div");
          wrapper.style.cssText = `padding:10px 16px ${isLast ? "0" : "10px"} 16px;`;

          const titleDiv = document.createElement("div");
          titleDiv.style.cssText = "font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:#1a1a1a;margin-bottom:2px;letter-spacing:-0.13px;";
          titleDiv.textContent = section.label;
          wrapper.appendChild(titleDiv);

          const para = document.createElement("div");
          para.style.cssText = "font-size:13px;font-weight:400;font-family:'Inter',sans-serif;color:#444;line-height:21px;letter-spacing:-0.13px;";
          para.textContent = items.join(" ");
          wrapper.appendChild(para);

          rpEl.appendChild(wrapper);

          if (!isLast) {
            const divider = document.createElement("div");
            divider.style.cssText = "height:1px;background:#B3E5FD;";
            rpEl.appendChild(divider);
          }
        });

        document.getElementById("readerPerspectiveCard").style.display = "block";
      }

      // Headline & Hook
      if (data.headline_and_hook) {
        const hh = data.headline_and_hook;
        const hhEl = document.getElementById("headlineHookContent");
        hhEl.innerHTML = "";

        const hhSections = [
          { key: "headline_feedback", label: "Başlık Değerlendirmesi", single: true },
          { key: "headline_suggestions", label: "Alternatif Başlıklar" },
          { key: "hook_rewrite", label: "Hook Yeniden Yazımı", single: true }
        ];

        const visibleHh = hhSections.filter(s => {
          const val = hh[s.key];
          return val && (Array.isArray(val) ? val.length > 0 : true);
        });

        visibleHh.forEach((section, si) => {
          const val = hh[section.key];
          const isLast = si === visibleHh.length - 1;

          const wrapper = document.createElement("div");
          wrapper.style.cssText = `padding:10px 16px ${isLast ? "0" : "10px"} 16px;`;

          const titleDiv = document.createElement("div");
          titleDiv.style.cssText = "font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:#1a1a1a;margin-bottom:2px;letter-spacing:-0.13px;";
          titleDiv.textContent = section.label;
          wrapper.appendChild(titleDiv);

          if (section.single) {
            const para = document.createElement("div");
            para.style.cssText = "font-size:13px;font-weight:400;font-family:'Inter',sans-serif;color:#444;line-height:21px;letter-spacing:-0.13px;";
            para.textContent = val;
            wrapper.appendChild(para);
          } else {
            val.forEach(item => {
              const para = document.createElement("div");
              para.style.cssText = "font-size:13px;font-weight:400;font-family:'Inter',sans-serif;color:#444;line-height:21px;letter-spacing:-0.13px;margin-bottom:2px;";
              para.textContent = item;
              wrapper.appendChild(para);
            });
          }

          hhEl.appendChild(wrapper);

          if (!isLast) {
            const divider = document.createElement("div");
            divider.style.cssText = "height:1px;background:#D3CCFF;";
            hhEl.appendChild(divider);
          }
        });

        document.getElementById("headlineHookCard").style.display = "block";
      }

      document.getElementById("resultCard").classList.add("show");
      document.getElementById("panelOverlay").classList.add("show");
      hideAgainBtn();
    }

    async function handleScore() {
      const url = urlInput.value.trim();
      if (!url && !docText.trim() && !docxBase64) { showToast("error", "Lütfen bir link girin veya doküman yükleyin."); return; }
      setLoading(true);

      const PROXY_URL = "https://article-score.vercel.app/api/score";

      let body;
      if (docxBase64) {
        body = JSON.stringify({ docxBase64 });
      } else if (docText.trim()) {
        body = JSON.stringify({ content: `Aşağıdaki makale metnini değerlendir:\n\n${docText.slice(0, 8000)}` });
      } else {
        body = JSON.stringify({ content: `Şu Medium makalesini değerlendir (URL): ${url}` });
      }

      try {
        const response = await fetch(PROXY_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body });
        const parsed = await response.json();
        if (!response.ok) throw new Error(parsed.error || "Sunucu hatası");
        if (parsed.score === 0 && parsed.strengths && parsed.strengths.length === 0) {
          showToast("error", parsed.summary || "Geçerli bir makale bulunamadı.");
          setLoading(false);
          return;
        }
        renderResult(parsed);
      } catch (e) {
        showToast("error", "Bir hata oluştu. Lütfen tekrar deneyin.");
      } finally {
        setLoading(false);
      }
    }
  </script>
