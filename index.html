<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medium Article Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,900;1,9..144,300;1,9..144,900&family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --black: #1a1a1a;
      --gray: #888;
      --border: #e8e8e8;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --orange-bg: #fff7ed;
      --orange-border: #fed7aa;
    }

    html, body {
      min-height: 100%;
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 90px;
      padding-bottom: 100px;
      padding-left: 16px;
      padding-right: 16px;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
    }
    .logo-wrap svg {
      width: 394px;
      height: 120px;
    }

    /* ── Card ── */
    .card {
      width: 394px;
      max-width: 100%;
      background: #fff;
      border: 1px solid #E6E6E6;
      border-radius: 10px;
      padding: 0 0 24px 0;
      box-shadow: 0 1px 2px rgba(26, 26, 26, 0.05);
    }

    .card-inner {
      padding: 24px 24px 0 24px;
    }

    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', 'DM Sans', sans-serif;
      color: #555;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 346px;
      max-width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      color: var(--black);
      background: #fff;
      box-shadow: 0 1px 2px rgba(26, 26, 26, 0.05);
      display: block;
    }
    input[type="text"]:focus { border-color: #1a1a1a; box-shadow: none; outline: none; }
    input[type="text"]:disabled { background: #f9f9f9; color: #aaa; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text {
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: #9E9E9E;
      letter-spacing: 0;
    }

    .dropzone {
      width: 346px;
      max-width: 100%;
      border-radius: 8px;
      padding: 0;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: background 0.2s;
      position: relative;
      /* SVG dashed border: dash=5 gap=5, stroke=#D0D0D0, radius=8 */
      background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' rx='8' ry='8' fill='none' stroke='%23D0D0D0' stroke-width='1.5' stroke-dasharray='5%2C5' stroke-dashoffset='0'/%3E%3C/svg%3E");
    }
    .dropzone-inner {
      padding-top: 24px;
      padding-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dropzone:hover, .dropzone.drag-over { background-color: #fafafa; }
    .dropzone.has-file {
      background-color: #f0fdf4;
      background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' rx='8' ry='8' fill='none' stroke='%2322c55e' stroke-width='1.5' stroke-dasharray='5%2C5' stroke-dashoffset='0'/%3E%3C/svg%3E");
    }
    .dropzone-icon { display: flex; justify-content: center; margin-bottom: 4px; }
    .dropzone-text {
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: #1a1a1a;
    }
    .dropzone-sub { font-size: 11px; color: #bbb; margin-top: 4px; }
    .dropzone-filename { font-size: 13px; font-weight: 600; color: #16a34a; }
    .dropzone-change { font-size: 11px; color: #888; margin-top: 4px; }

    .error-msg { color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
    .error-msg.show { display: block; }

    .btn-score {
      width: 346px;
      max-width: 100%;
      margin-top: 20px;
      padding: 10px 14px;
      background: var(--black);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-score:hover { background: #333; }
    .btn-score:active { transform: scale(0.99); }
    .btn-score:disabled { background: #555; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    /* ── Result Card ── */
    .result-card {
      width: 394px;
      max-width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 2px 28px rgba(0,0,0,0.06);
      margin-top: 24px;
      display: none;
      animation: fadeUp 0.5s ease;
    }
    .result-card.show { display: block; }

    .score-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .score-ring-wrap { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
    .score-ring-wrap svg { transform: rotate(-90deg); }
    .score-ring-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number {
      font-size: 32px;
      font-weight: 800;
      font-family: 'Fraunces', serif;
      line-height: 1;
    }
    .score-denom { font-size: 11px; color: #888; letter-spacing: 1px; margin-top: 2px; }

    .score-meta { flex: 1; min-width: 160px; }
    .grade-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .grade-letter { font-size: 36px; font-weight: 900; font-family: 'Fraunces', serif; line-height: 1; }
    .grade-label { font-size: 13px; color: #888; }
    .summary-text { font-size: 13.5px; color: #444; line-height: 1.65; }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title.green { color: #16a34a; }
    .section-title.orange { color: #ea580c; }

    .feedback-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .feedback-item {
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .feedback-item.strength { background: var(--green-bg); border: 1px solid var(--green-border); }
    .feedback-item.improvement { background: var(--orange-bg); border: 1px solid var(--orange-border); }
    .feedback-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .feedback-title { font-weight: 700; font-size: 14px; color: var(--black); margin-bottom: 4px; }
    .feedback-detail { font-size: 13px; color: #555; line-height: 1.6; }

    /* ── Sticky bottom MEDIUM ── */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      pointer-events: none;
      z-index: 100;
    }
    .bottom-bar svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Animations ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .logo-wrap svg { width: 260px; }
      .card, .result-card { padding: 20px; }
      .score-header { gap: 16px; }
    }
  </style>
</head>

  <!-- Input Card -->

    <div class="card-inner">
      <label class="field-label">Medium Link</label>
      <input type="text" id="urlInput" placeholder="https://medium.com/@kullanici/makale-basligi" />

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">VEYA</span>
        <div class="divider-line"></div>

        <span id="btnText">Makaleyi puanla →</span>
      </button>
    </div>
  </div>

  <!-- Result -->

        <div class="score-ring-inner">
          <span class="score-number" id="scoreNumber">0</span>
          <span class="score-denom">/ 100</span>
        </div>
      </div>
      <div class="score-meta">
        <div class="grade-row">
          <span class="grade-letter" id="gradeLetter">—</span>
          <span class="grade-label">Genel Not</span>
        </div>
        <p class="summary-text" id="summaryText"></p>
      </div>
    </div>

    <div class="section-title green">💚 GÜÇLÜ YÖNLER</div>
    <div class="feedback-list" id="strengthsList"></div>

    <div class="section-title orange">🔶 GELİŞTİRİLEBİLİR YÖNLER</div>

      <path d="M862.898 0V21.672H858.783V0H862.898Z" fill="black"/>

      <path d="M1416.18 0H1421.21L1427.96 15.7037H1428.22L1434.97 0H1440V21.672H1436.05V6.78307H1435.84L1429.56 21.6085H1426.61L1420.34 6.75132H1420.13V21.672H1416.18V0Z" fill="black"/>
    </svg>
  </div>

  <script>
    const SCORE_PROMPT = `Sen bir Medium makale editörü ve içerik stratejistisin. Sana verilen makaleyi veya makale URL'sini analiz edip aşağıdaki formatta JSON döndür.

Değerlendirme kriterleri:
- Başlık çekiciliği ve SEO uyumu
- Giriş paragrafının gücü (hook)
- Akış ve okunabilirlik
- Derinlik ve özgünlük
- Pratik değer ve uygulanabilirlik
- Görsel yapı (başlıklar, paragraflar, listeler)
- Sonuç ve call-to-action
- Dil ve ton tutarlılığı

SADECE şu JSON formatında yanıt ver, başka hiçbir şey yazma:
{
  "score": <0-100 arası sayı>,
  "grade": "<A+/A/A-/B+/B/B-/C+/C/C-/D/F>",
  "summary": "<2 cümlelik genel değerlendirme>",
  "strengths": [
    {"title": "<güçlü yön başlığı>", "detail": "<açıklama>"},
    {"title": "<güçlü yön başlığı>", "detail": "<açıklama>"},
    {"title": "<güçlü yön başlığı>", "detail": "<açıklama>"},
    {"title": "<güçlü yön başlığı>", "detail": "<açıklama>"}
  ],
  "improvements": [
    {"title": "<geliştirme başlığı>", "detail": "<nasıl geliştirilebilir>"},
    {"title": "<geliştirme başlığı>", "detail": "<nasıl geliştirilebilir>"},
    {"title": "<geliştirme başlığı>", "detail": "<nasıl geliştirilebilir>"},
    {"title": "<geliştirme başlığı>", "detail": "<nasıl geliştirilebilir>"}
  ]
}`;

    const strengthIcons = ["💪", "✨", "🎯", "🚀"];
    const improvementIcons = ["🔧", "💡", "📈", "🎨"];

    let docText = "";
    let fileName = "";

    // Dropzone interactions
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const urlInput = document.getElementById("urlInput");

    dropzone.addEventListener("click", () => fileInput.click());

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("drag-over");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    urlInput.addEventListener("input", () => {
      if (urlInput.value.trim()) {
        docText = "";
        fileName = "";
        resetDropzone();
        urlInput.disabled = false;
      }
    });

    const IMPORT_SVG = `<svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.5026 30.625L17.5026 13.125M17.5026 13.125L23.3359 18.9583M17.5026 13.125L11.6693 18.9583M23.3359 27.7083L29.1693 27.7083C29.9428 27.7083 30.6847 27.401 31.2317 26.8541C31.7787 26.3071 32.0859 25.5652 32.0859 24.7917L32.0859 10.2083C32.0859 9.43479 31.7787 8.69292 31.2317 8.14594C30.6847 7.59896 29.9428 7.29167 29.1693 7.29167L5.83594 7.29167C5.06239 7.29167 4.32053 7.59896 3.77355 8.14594C3.22656 8.69292 2.91927 9.43478 2.91927 10.2083L2.91927 24.7917C2.91927 25.5652 3.22656 26.3071 3.77354 26.8541C4.32053 27.401 5.06239 27.7083 5.83594 27.7083L11.6693 27.7083" stroke="#09090B" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    function handleFile(file) {
      fileName = file.name;
      urlInput.value = "";
      urlInput.disabled = true;

      const reader = new FileReader();
      reader.onload = (e) => {
        docText = e.target.result;
        dropzone.classList.add("has-file");
        document.getElementById("dzIcon").innerHTML = `<span style="font-size:28px">📄</span>`;
        document.getElementById("dzText").className = "dropzone-filename";
        document.getElementById("dzText").textContent = fileName;
      };
      reader.readAsText(file);
    }

    function resetDropzone() {
      dropzone.classList.remove("has-file");
      document.getElementById("dzIcon").innerHTML = IMPORT_SVG;
      document.getElementById("dzText").className = "dropzone-text";
      document.getElementById("dzText").textContent = "Dokümanını buraya sürükle veya tıkla";
    }

    function setLoading(on) {
      const btn = document.getElementById("scoreBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      btn.disabled = on;
      spinner.style.display = on ? "inline-block" : "none";
      btnText.textContent = on ? "Analiz ediliyor..." : "Makaleyi puanla →";
    }

    function getGradeColor(grade) {
      if (!grade) return "#1a1a1a";
      if (grade.startsWith("A")) return "#16a34a";
      if (grade.startsWith("B")) return "#2563eb";
      if (grade.startsWith("C")) return "#d97706";
      return "#dc2626";
    }

    function getScoreColor(score) {
      if (score >= 80) return "#22c55e";
      if (score >= 60) return "#f97316";
      if (score >= 40) return "#eab308";
      return "#ef4444";
    }

    function animateScore(score) {
      const circle = document.getElementById("scoreCircle");
      const numEl = document.getElementById("scoreNumber");
      const circumference = 339.29;
      const offset = circumference - (score / 100) * circumference;
      circle.style.stroke = getScoreColor(score);

      // Animate number
      let current = 0;
      const step = score / 60;
      const interval = setInterval(() => {
        current = Math.min(current + step, score);
        numEl.textContent = Math.round(current);
        if (current >= score) clearInterval(interval);
      }, 16);

      // Animate ring after short delay
      setTimeout(() => {
        circle.style.strokeDashoffset = offset;
      }, 100);
    }

    function renderResult(data) {
      // Score ring
      animateScore(data.score);

      // Grade
      const gradeLetter = document.getElementById("gradeLetter");
      gradeLetter.textContent = data.grade;
      gradeLetter.style.color = getGradeColor(data.grade);

      // Summary
      document.getElementById("summaryText").textContent = data.summary;

      // Strengths
      const sl = document.getElementById("strengthsList");
      sl.innerHTML = "";
      (data.strengths || []).forEach((s, i) => {
        sl.innerHTML += `
          <div class="feedback-item strength">
            <span class="feedback-icon">${strengthIcons[i] || "💪"}</span>
            <div>
              <div class="feedback-title">${s.title}</div>
              <div class="feedback-detail">${s.detail}</div>
            </div>
          </div>`;
      });

      // Improvements
      const il = document.getElementById("improvementsList");
      il.innerHTML = "";
      (data.improvements || []).forEach((imp, i) => {
        il.innerHTML += `
          <div class="feedback-item improvement">
            <span class="feedback-icon">${improvementIcons[i] || "🔧"}</span>
            <div>
              <div class="feedback-title">${imp.title}</div>
              <div class="feedback-detail">${imp.detail}</div>
            </div>
          </div>`;
      });

      // Show card
      const card = document.getElementById("resultCard");
      card.classList.add("show");
      card.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    async function handleScore() {
      const url = urlInput.value.trim();
      const errEl = document.getElementById("errorMsg");

      if (!url && !docText.trim()) {
        errEl.classList.add("show");
        return;
      }
      errEl.classList.remove("show");
      setLoading(true);

      const content = docText.trim()
        ? `Aşağıdaki makale metnini değerlendir:\n\n${docText.slice(0, 6000)}`
        : `Şu Medium makalesini değerlendir (URL): ${url}`;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: SCORE_PROMPT,
            messages: [{ role: "user", content }],
          }),
        });
        const data = await response.json();
        const text = (data.content || []).map(b => b.text || "").join("");
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        renderResult(parsed);
      } catch (e) {
        errEl.textContent = "Bir hata oluştu. Lütfen tekrar deneyin.";
        errEl.classList.add("show");
      } finally {
        setLoading(false);
      }
    }
  </script>
